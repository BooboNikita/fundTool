version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fundtool-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fundtool_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fund_tool}
      MYSQL_USER: ${MYSQL_USER:-fundtool}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fundtool_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - fundtool-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundtool-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-fundtool}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fundtool_password}
      DB_NAME: ${MYSQL_DATABASE:-fund_tool}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fundtool-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fundtool-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fundtool-network

networks:
  fundtool-network:
    driver: bridge

volumes:
  mysql_data:
