version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundtool-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PROD_DB_HOST: mysql_n7tn-mysql_N7tN-1
      PROD_DB_PORT: 3306
      PROD_DB_USER: root
      PROD_DB_PASSWORD: i8ZPbjzY7CiXNStp
      PROD_DB_NAME: fund_tool
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3035:3035"
    networks:
      - baota_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fundtool-frontend
    restart: unless-stopped
    ports:
      - "9001:9001"
    depends_on:
      - backend
    networks:
      - baota_net

networks:
  baota_net:
    external: true
