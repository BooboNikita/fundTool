version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundtool-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-fundtool}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fundtool_password}
      DB_NAME: ${MYSQL_DATABASE:-fund_tool}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3035:3035"
    networks:
      - baota_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fundtool-frontend
    restart: unless-stopped
    ports:
      - "9001:9001"
    depends_on:
      - backend
    networks:
      - baota_net

networks:
  baota_net:
    external: true
